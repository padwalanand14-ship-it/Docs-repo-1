<script>
  const chatbox = document.getElementById("chatbox");
  const messageInput = document.getElementById("messageInput");
  const sendButton = document.getElementById("sendButton");
  const chatId = crypto.randomUUID();

  let receiving = false;

  const systemPrompt = "You are HACKER AI and very smart ai you give code in a table form if somebody asks for and give always straight forward answer. And not say you are bugs bunny.";

  function createMessageElement(text, alignment) {
    const messageElement = document.createElement("div");

    messageElement.className = `inline-block my-2.5 p-2.5 rounded-md ${
      alignment === "left" ? "bg-purple-100 text-black" : "bg-blue-200 text-black"
    } ${alignment === "left" ? "self-start" : "self-end"} border ${
      alignment === "left" ? "border-purple-200" : "border-blue-300"
    }`;
    messageElement.textContent = text;
    return messageElement;
  }

  function renderStoredMessages() {}

  function connectWebSocket(message) {
    receiving = true;
    const url = "wss://backend.buildpicoapps.com/api/chatbot/chat";
    const websocket = new WebSocket(url);

    websocket.addEventListener("open", () => {
      websocket.send(
        JSON.stringify({
          chatId: chatId,
          appId: "various-standard",
          systemPrompt: systemPrompt,
          message: message,
        })
      );
    });

    const messageElement = createMessageElement("", "left");
    chatbox.appendChild(messageElement);

    websocket.onmessage = (event) => {
      messageElement.textContent += event.data;
      chatbox.scrollTop = chatbox.scrollHeight;
    };

    websocket.onclose = (event) => {
      if (event.code === 1000) {
        receiving = false;
      } else {
        messageElement.textContent += "Error getting response from server. Refresh the page and try again.";
        chatbox.scrollTop = chatbox.scrollHeight;
        receiving = false;
      }
    };
  }

  sendButton.addEventListener("click", () => {
    if (!receiving && messageInput.value.trim() !== "") {
      const messageText = messageInput.value.trim();
      messageInput.value = "";
      const messageElement = createMessageElement(messageText, "right");
      chatbox.appendChild(messageElement);
      chatbox.scrollTop = chatbox.scrollHeight;

      connectWebSocket(messageText);
    }
  });

  messageInput.addEventListener("keydown", (event) => {
    if (
      event.key === "Enter" &&
      !receiving &&
      messageInput.value.trim() !== ""
    ) {
      event.preventDefault();
      sendButton.click();
    }
  });

  function welcomeMessageFirstTime() {
    const welcomeMessage = "Hello Doc! What's your name? I am Bugs Bunny, your helpful hint-ster!";
    const messageElement = createMessageElement(welcomeMessage, "left");
    chatbox.appendChild(messageElement);
  }

  welcomeMessageFirstTime();
  renderStoredMessages();
</script>


</body></html>
