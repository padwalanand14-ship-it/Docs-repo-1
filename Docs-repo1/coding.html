<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coding Playground - Creative Hub</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(to right, blue, red);
      color: white;
    }
    .navbar {
      background-color: #333;
      overflow: hidden;
    }
    .navbar a {
      float: left;
      display: block;
      color: #f2f2f2;
      text-align: center;
      padding: 14px 20px;
      text-decoration: none;
    }
    .navbar a:hover {
      background-color: #ddd;
      color: black;
    }
    main {
      padding: 20px;
    }
    h1 {
      text-align: center;
      margin-bottom: 20px;
    }
    textarea {
      width: 100%;
      min-height: 250px;
      padding: 10px;
      border-radius: 6px;
      border: none;
      font-family: monospace;
      font-size: 14px;
      margin-bottom: 20px;
    }
    iframe {
      width: 100%;
      height: 600px;
      border: 2px solid #fff;
      border-radius: 6px;
      background: white;
    }
    button {
      display: block;
      margin: 0 auto 20px auto;
      padding: 12px 20px;
      background-color: black;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 16px;
    }
    button:hover {
      background-color: #444;
    }
  </style>
</head>
<body>
<header>
  <div class="navbar">
    <a href="index.html">Home</a>
    <a href="services.html">Services</a>
    <a href="about.html">About</a>
    <a href="contact.html">Contact</a>
    <a href="form.html">Get Started</a>
  </div>
</header>

<main>
  <h1>Coding Playground 💻</h1>
  <p style="text-align:center;">Write your HTML, CSS, and JavaScript together in one editor, then click "Run Code" to see the result below. You can practice here.</p>

  <textarea id="codeArea" placeholder="Type HTML, CSS, and JS here..."></textarea>
  <button onclick="runCode()">Run Code</button>
  <iframe id="output"></iframe>
</main>

<script>
  function runCode() {
    const code = document.getElementById("codeArea").value;
    const output = document.getElementById("output");
    output.srcdoc = code;
  }
</script>
</body>
</html>
